name: Deploy and Restart Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Protected Deploy with Rollback
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /home/claude-developer/claude-code-as-assistant

            # Fetch latest and extract deploy script into the project dir
            # (deploy.sh uses BASH_SOURCE to find the git repo, so it must live here)
            git fetch origin main
            git show origin/main:deploy.sh > ./deploy.sh
            chmod +x ./deploy.sh

            # Run protected deploy (smoke test + health check + rollback)
            bash ./deploy.sh
