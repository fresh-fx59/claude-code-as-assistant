name: gemini
description: Gemini CLI for one-shot Q&A, summaries, and generation.
triggers:
- gemini
- gemini
- one-shot
- q&a,
- gemini cli
- mcp
- extension
- extensions
- cli
- image generation
- генерация изображений
- сгенерируй через gemini
instructions: '# Gemini CLI


  Use Gemini in one-shot mode with a positional prompt (avoid interactive mode).


  Quick start


  - `gemini "Answer this question..."`

  - `gemini --model <name> "Prompt..."`

  - `gemini --output-format json "Return JSON"`

  Image generation via MCP (preferred for CLI-only workflow)

  - Configure once:
    `gemini mcp add --scope user mcp-image npx -y mcp-image`
  - Run with MCP server enabled:
    `gemini -p "<request>" --allowed-mcp-server-names mcp-image --output-format text`
  - For Telegram media flows, when an image is generated return exactly:
    `MEDIA: /absolute/path/to/image.png`


  Extensions


  - List: `gemini --list-extensions`

  - Manage: `gemini extensions <command>`


  Notes


  - If auth is required, run `gemini` once interactively and follow the login flow.

  - Avoid `--yolo` for safety.'
setup: 'Ensure binary installed: gemini'
