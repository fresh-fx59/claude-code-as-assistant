instructions: '# Nano Banana Pro (CLI-first via Gemini MCP)


  Preferred path: use `gemini` CLI with MCP server `mcp-image` (no direct API coding).


  Prerequisites


  - `gemini` CLI installed

  - MCP server configured once:

  ```bash

  gemini mcp add --scope user mcp-image npx -y mcp-image

  ```

  - `GEMINI_API_KEY` set in environment


  Generate image


  ```bash

  gemini -p "Use generate_image tool. Prompt: ''<your prompt>''. Save to /tmp/<timestamp>-image.png. Return only MEDIA line." --allowed-mcp-server-names mcp-image --output-format text

  ```


  Edit image


  ```bash

  gemini -p "Use generate_image tool to edit /abs/path/input.png with: ''<edit instructions>''. Save to /tmp/<timestamp>-edit.png. Return only MEDIA line." --allowed-mcp-server-names mcp-image --output-format text

  ```


  Response format requirement


  - Return only one line: `MEDIA: /absolute/path/to/file.png`

  - Do not include extra explanatory text around `MEDIA:`.


  Fallback path (legacy)


  - If MCP is unavailable, use the bundled script:

  ```bash

  uv run {baseDir}/scripts/generate_image.py --prompt "..." --filename "/tmp/<timestamp>-image.png"

  ```'
setup: 'Ensure binaries installed: gemini, node/npx; optional fallback: uv'
